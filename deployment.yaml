apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-api

  template:
    metadata:
      labels:
        app: flask-api

    spec:
      containers:
      - name: flask-api
        image: naveendocker9677/flask-api:v1
        ports:
        - containerPort: 5000